# Available runners configured by board.cmake.
runners:
- openocd
- jlink
- dfu-util

# Default flash runner if --runner is not given.
flash-runner: openocd

# Default debug runner if --runner is not given.
debug-runner: openocd

# Common runner configuration values.
config:
  board_dir: D:/DOCUMENT/RoboLife_Farm/zephyrproject/zephyr/boards/others/black_f407ve
  # Build outputs:
  elf_file: zephyr.elf
  hex_file: zephyr.hex
  bin_file: zephyr.bin
  # Host tools:
  gdb: C:/Users/hihi/zephyr-sdk-1.0.1/gnu/arm-zephyr-eabi/bin/arm-zephyr-eabi-gdb-py.exe
  openocd: C:/Users/hihi/zephyr-sdk-1.0.1/hosttools/openocd/bin/openocd.exe
  openocd_search:
    - C:/Users/hihi/zephyr-sdk-1.0.1/hosttools/openocd/share/openocd/scripts

# Runner specific arguments
args:
  openocd:
    - --cmd-load
    - flash write_image erase
    - --cmd-verify
    - verify_image
  jlink:
    - --dt-flash=y
    - --device=STM32F407VE
    - --speed=4000
  dfu-util:
    - --pid=0483:df11
    - --alt=0
    - --dfuse
