# C++ support
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FLOAT_PRINTF=n
CONFIG_NEWLIB_LIBC=n

# Zephyr kernel features
CONFIG_MULTITHREADING=y
CONFIG_NUM_PREEMPT_PRIORITIES=16

# Message queues
CONFIG_HEAP_MEM_POOL_SIZE=0

# GPIO
CONFIG_GPIO=y

# PWM
CONFIG_PWM=y
CONFIG_PWM_STM32=y

# UART (async API)
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y
CONFIG_UART_STM32=y

# Ring buffer (for UART buffering)
CONFIG_RING_BUFFER=y

# Logging (via Zephyr LOG, not printf)
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_RTT=n
CONFIG_LOG_BACKEND_UART=y

# Watchdog (optional safety)
CONFIG_WATCHDOG=n

# Disable unused features to reduce footprint
CONFIG_STDOUT_CONSOLE=n
CONFIG_PRINTK=y
CONFIG_ASSERT=y
